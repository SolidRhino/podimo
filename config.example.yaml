# Podimo to RSS — YAML configuration reference
# Place this file as `config.yaml` in the working directory,
# or at `/etc/podimo-rss/config.yaml`.
# Environment variables prefixed with `PODIMO_` override these values.

# Server settings
hostname: "localhost:12104"
bind_host: "127.0.0.1:12104"
protocol: "http"

# Local credentials (single-user mode; read README before enabling)
local_credentials: false
email: ""
password: ""

# Public feeds — removes itunes:block so podcast catalogues may index them
public_feeds: false

# Trusted proxy header for client IP extraction (rate limiting).
# Only set this when running behind a trusted reverse proxy. If set,
# the header's first value (e.g. X-Forwarded-For) is used instead of
# the direct RemoteAddr for rate-limit keying. Setting this when
# clients can spoof the header enables rate-limit bypass.
trusted_proxy_header: ""

# Proxy / scraper settings
http_proxy: ""
zenrows_api: ""
scraper_api: ""

# Caching
cache_dir: "./cache"
block_list_file: "./.block-list"
store_tokens_on_disk: true
token_cache_time: "432000s"   # 5 days
podcast_cache_time: "21600s"  # 6 hours
head_cache_time: "604800s"    # 7 days

# Logging
debug: false
