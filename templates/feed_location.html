<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Podimo-to-RSS converter</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="/static/fonts.min.css">
  <link rel="stylesheet" href="/static/style.min.css">
  <script src="/static/htmx.min.js"></script>
  <script src="/static/qrcode.min.js"></script>
  <script defer src="/static/alpine.min.js"></script>
</head>
<body>
  <a href="#feed-url" class="skip-link">Skip to feed URL</a>
  <h1>Your RSS feed is ready</h1>

  <p>Copy this link into your podcast player (only works if it supports custom private RSS feeds).</p>
  <div class="feed-result">
  {{ template "feed_result" . }}
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      var anchor = document.getElementById('feed-url');
      var el = document.querySelector('.qrcode');
      if (anchor && el && window.QRCode) {
        el.innerHTML = '';
        new QRCode(el, { text: anchor.href, width: 200, height: 200 });
      }
    });
  </script>
</body>
</html>
