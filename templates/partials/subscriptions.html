{{ if .Error }}
<span class="search-err">Error: {{ .Error }}</span>
{{ else if not .Results }}
<em class="search-msg">No subscriptions found.</em>
{{ else }}
<ul>
  {{ range .Results }}
  <li onclick="selectPodcast('{{ .id }}')">
    {{ if .coverImageUrl }}
    <img src="{{ .coverImageUrl }}" width="48" height="48">
    {{ end }}
    <div>
      <strong>{{ .title }}</strong>
    </div>
  </li>
  {{ end }}
</ul>
{{ end }}
