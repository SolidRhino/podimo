{{ if .Error }}
<span class="search-err">Error: {{ .Error }}</span>
{{ else if not .Results }}
<em class="search-msg">No podcasts found.</em>
{{ else }}
<ul>
  {{ range .Results }}
  <li onclick="selectPodcast('{{ .ID }}')">
    {{ if .CoverImageURL }}
    <img src="{{ .CoverImageURL }}" width="48" height="48">
    {{ end }}
    <div>
      <strong>{{ .Title }}</strong>
      {{ if .AuthorName }}
      <br><small>{{ .AuthorName }}</small>
      {{ end }}
    </div>
  </li>
  {{ end }}
</ul>
{{ end }}
